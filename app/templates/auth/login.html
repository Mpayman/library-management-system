{% extends "base.html" %}

{% block title %}Login | Stacks & Stories{% endblock %}

{% block content %}
<section class="form-shell narrow">
    <div class="form-intro">
        <p class="eyebrow">Authentication</p>
        <h1>Sign in to the library system</h1>
        <p>Use your member, librarian, or admin account to continue.</p>
    </div>

    <form method="post" class="form-card">
        <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="name@example.com" required>
        </label>
        <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter your password" required>
        </label>
        <button type="submit" class="button">Sign In</button>
        <p class="form-note">Need an account? <a href="{{ url_for('auth.register') }}">Register here</a>.</p>
    </form>
</section>
{% endblock %}
